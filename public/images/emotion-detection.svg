<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#171728"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <!-- Title -->
  <text x="600" y="55" fill="#f1f5f9" font-family="system-ui" font-size="32" font-weight="700" text-anchor="middle">Human Emotion Detection</text>
  <text x="600" y="88" fill="#94a3b8" font-family="system-ui" font-size="18" text-anchor="middle">Custom CNN | 4.5M Parameters | 7 Emotion Categories | Live Webcam</text>
  <!-- Left: Face detection visualization -->
  <g transform="translate(60, 120)">
    <!-- Face outline -->
    <ellipse cx="210" cy="210" rx="130" ry="170" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.35"/>
    <!-- Scan lines -->
    <g opacity="0.1" stroke="#06b6d4" stroke-width="1">
      <line x1="80" y1="120" x2="340" y2="120"/>
      <line x1="80" y1="160" x2="340" y2="160"/>
      <line x1="80" y1="200" x2="340" y2="200"/>
      <line x1="80" y1="240" x2="340" y2="240"/>
      <line x1="80" y1="280" x2="340" y2="280"/>
      <line x1="80" y1="320" x2="340" y2="320"/>
    </g>
    <!-- Eyes -->
    <ellipse cx="170" cy="180" rx="25" ry="14" stroke="#06b6d4" stroke-width="1.5" fill="#06b6d4" fill-opacity="0.1"/>
    <ellipse cx="250" cy="180" rx="25" ry="14" stroke="#06b6d4" stroke-width="1.5" fill="#06b6d4" fill-opacity="0.1"/>
    <circle cx="170" cy="180" r="6" fill="#06b6d4" opacity="0.5"/>
    <circle cx="250" cy="180" r="6" fill="#06b6d4" opacity="0.5"/>
    <!-- Nose -->
    <line x1="210" y1="200" x2="210" y2="240" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <!-- Smile -->
    <path d="M175 270 Q210 300 245 270" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.4"/>
    <!-- Detection box -->
    <rect x="60" y="30" width="300" height="360" rx="6" stroke="#06b6d4" stroke-width="2" fill="none" stroke-dasharray="10,5" opacity="0.4"/>
    <!-- Label -->
    <rect x="60" y="5" width="80" height="25" rx="4" fill="#06b6d4" opacity="0.75"/>
    <text x="100" y="22" fill="#0f172a" font-family="system-ui" font-size="12" font-weight="700" text-anchor="middle">HAPPY</text>
    <rect x="145" y="5" width="70" height="25" rx="4" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <text x="180" y="22" fill="#67e8f9" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">87.2%</text>
  </g>
  <!-- Center: CNN Architecture -->
  <g transform="translate(460, 130)">
    <text x="150" y="0" fill="#94a3b8" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">CNN Architecture (4.5M params)</text>
    <!-- Conv layers -->
    <rect x="0" y="30" width="40" height="280" rx="4" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="20" y="325" fill="#67e8f9" font-family="system-ui" font-size="9" text-anchor="middle">32</text>
    <rect x="55" y="50" width="40" height="240" rx="4" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
    <text x="75" y="305" fill="#67e8f9" font-family="system-ui" font-size="9" text-anchor="middle">64</text>
    <rect x="110" y="75" width="40" height="190" rx="4" fill="#06b6d4" opacity="0.25" stroke="#06b6d4" stroke-width="1"/>
    <text x="130" y="280" fill="#67e8f9" font-family="system-ui" font-size="9" text-anchor="middle">128</text>
    <rect x="165" y="100" width="40" height="140" rx="4" fill="#06b6d4" opacity="0.3" stroke="#06b6d4" stroke-width="1"/>
    <text x="185" y="255" fill="#67e8f9" font-family="system-ui" font-size="9" text-anchor="middle">256</text>
    <rect x="220" y="120" width="40" height="100" rx="4" fill="#06b6d4" opacity="0.35" stroke="#06b6d4" stroke-width="1"/>
    <text x="240" y="235" fill="#67e8f9" font-family="system-ui" font-size="9" text-anchor="middle">512</text>
    <!-- Dense -->
    <rect x="275" y="140" width="30" height="60" rx="4" fill="#f43f5e" opacity="0.2" stroke="#f43f5e" stroke-width="1"/>
    <text x="290" y="215" fill="#fda4af" font-family="system-ui" font-size="9" text-anchor="middle">Dense</text>
    <!-- Output -->
    <rect x="320" y="150" width="30" height="40" rx="4" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1"/>
    <text x="335" y="205" fill="#6ee7b7" font-family="system-ui" font-size="9" text-anchor="middle">7</text>
    <!-- Arrows -->
    <g stroke="#475569" stroke-width="1" opacity="0.3">
      <line x1="40" y1="170" x2="55" y2="170"/>
      <line x1="95" y1="170" x2="110" y2="170"/>
      <line x1="150" y1="170" x2="165" y2="170"/>
      <line x1="205" y1="170" x2="220" y2="170"/>
      <line x1="260" y1="170" x2="275" y2="170"/>
      <line x1="305" y1="170" x2="320" y2="170"/>
    </g>
  </g>
  <!-- Right: Metrics + Emotions -->
  <g transform="translate(850, 130)">
    <text x="150" y="0" fill="#94a3b8" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">Performance</text>
    <!-- Metric cards -->
    <rect x="0" y="20" width="140" height="70" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <text x="70" y="52" fill="#06b6d4" font-family="system-ui" font-size="24" font-weight="700" text-anchor="middle">66.4%</text>
    <text x="70" y="72" fill="#94a3b8" font-family="system-ui" font-size="11" text-anchor="middle">Validation Acc.</text>
    <rect x="155" y="20" width="140" height="70" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
    <text x="225" y="52" fill="#10b981" font-family="system-ui" font-size="24" font-weight="700" text-anchor="middle">68.9%</text>
    <text x="225" y="72" fill="#94a3b8" font-family="system-ui" font-size="11" text-anchor="middle">Cross-Dataset</text>
    <!-- Emotion categories -->
    <text x="150" y="125" fill="#94a3b8" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">7 Emotion Categories</text>
    <rect x="0" y="140" width="85" height="28" rx="6" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="42" y="159" fill="#67e8f9" font-family="system-ui" font-size="11" text-anchor="middle">Happy</text>
    <rect x="95" y="140" width="85" height="28" rx="6" fill="#f43f5e" opacity="0.15" stroke="#f43f5e" stroke-width="1"/>
    <text x="137" y="159" fill="#fda4af" font-family="system-ui" font-size="11" text-anchor="middle">Angry</text>
    <rect x="190" y="140" width="85" height="28" rx="6" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
    <text x="232" y="159" fill="#c4b5fd" font-family="system-ui" font-size="11" text-anchor="middle">Sad</text>
    <rect x="0" y="178" width="85" height="28" rx="6" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="42" y="197" fill="#fcd34d" font-family="system-ui" font-size="11" text-anchor="middle">Surprised</text>
    <rect x="95" y="178" width="85" height="28" rx="6" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="137" y="197" fill="#6ee7b7" font-family="system-ui" font-size="11" text-anchor="middle">Neutral</text>
    <rect x="190" y="178" width="85" height="28" rx="6" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="1"/>
    <text x="232" y="197" fill="#f9a8d4" font-family="system-ui" font-size="11" text-anchor="middle">Fearful</text>
    <rect x="95" y="216" width="85" height="28" rx="6" fill="#64748b" opacity="0.15" stroke="#64748b" stroke-width="1"/>
    <text x="137" y="235" fill="#94a3b8" font-family="system-ui" font-size="11" text-anchor="middle">Disgusted</text>
    <!-- Dataset info -->
    <rect x="0" y="270" width="295" height="60" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="150" y="296" fill="#cbd5e1" font-family="system-ui" font-size="13" text-anchor="middle">22K+ FER2013 images + CK+ validation</text>
    <text x="150" y="316" fill="#94a3b8" font-family="system-ui" font-size="11" text-anchor="middle">Data augmentation | BatchNorm | Dropout 0.25</text>
  </g>
</svg>
