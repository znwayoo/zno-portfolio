<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.08" stroke="#94a3b8" stroke-width="1">
    <line x1="120" y1="180" x2="1080" y2="180"/>
    <line x1="120" y1="260" x2="1080" y2="260"/>
    <line x1="120" y1="340" x2="1080" y2="340"/>
    <line x1="120" y1="420" x2="1080" y2="420"/>
    <line x1="120" y1="500" x2="1080" y2="500"/>
  </g>
  <!-- Axis -->
  <line x1="120" y1="500" x2="1080" y2="500" stroke="#475569" stroke-width="2"/>
  <line x1="120" y1="180" x2="120" y2="500" stroke="#475569" stroke-width="2"/>
  <!-- Y-axis labels -->
  <text x="105" y="505" fill="#64748b" font-family="system-ui" font-size="11" text-anchor="end">0</text>
  <text x="105" y="425" fill="#64748b" font-family="system-ui" font-size="11" text-anchor="end">4k</text>
  <text x="105" y="345" fill="#64748b" font-family="system-ui" font-size="11" text-anchor="end">8k</text>
  <text x="105" y="265" fill="#64748b" font-family="system-ui" font-size="11" text-anchor="end">12k</text>
  <text x="105" y="185" fill="#64748b" font-family="system-ui" font-size="11" text-anchor="end">16k</text>
  <!-- Bar groups: Afghanistan, Sudan, Myanmar, Cameroon -->
  <!-- Afghanistan: asylum 6462, student 217 -->
  <rect x="180" y="218" width="70" height="282" rx="3" fill="url(#bar1)" opacity="0.9"/>
  <rect x="255" y="493" width="70" height="7" rx="3" fill="url(#bar2)" opacity="0.9"/>
  <text x="250" y="545" fill="#94a3b8" font-family="system-ui" font-size="13" text-anchor="middle">Afghanistan</text>
  <text x="215" y="210" fill="#60a5fa" font-family="system-ui" font-size="11" text-anchor="middle">6,462</text>
  <text x="290" y="488" fill="#fbbf24" font-family="system-ui" font-size="11" text-anchor="middle">217</text>
  <!-- Sudan: asylum 5869, student 191 -->
  <rect x="400" y="241" width="70" height="259" rx="3" fill="url(#bar1)" opacity="0.9"/>
  <rect x="475" y="494" width="70" height="6" rx="3" fill="url(#bar2)" opacity="0.9"/>
  <text x="470" y="545" fill="#94a3b8" font-family="system-ui" font-size="13" text-anchor="middle">Sudan</text>
  <text x="435" y="233" fill="#60a5fa" font-family="system-ui" font-size="11" text-anchor="middle">5,869</text>
  <text x="510" y="488" fill="#fbbf24" font-family="system-ui" font-size="11" text-anchor="middle">191</text>
  <!-- Myanmar: asylum 879, student 1690 -->
  <rect x="620" y="465" width="70" height="35" rx="3" fill="url(#bar1)" opacity="0.9"/>
  <rect x="695" y="432" width="70" height="68" rx="3" fill="url(#bar2)" opacity="0.9"/>
  <text x="690" y="545" fill="#94a3b8" font-family="system-ui" font-size="13" text-anchor="middle">Myanmar</text>
  <text x="655" y="458" fill="#60a5fa" font-family="system-ui" font-size="11" text-anchor="middle">879</text>
  <text x="730" y="425" fill="#fbbf24" font-family="system-ui" font-size="11" text-anchor="middle">1,690</text>
  <!-- Cameroon: asylum 800, student 500 (approximate) -->
  <rect x="840" y="468" width="70" height="32" rx="3" fill="url(#bar1)" opacity="0.9"/>
  <rect x="915" y="480" width="70" height="20" rx="3" fill="url(#bar2)" opacity="0.9"/>
  <text x="910" y="545" fill="#94a3b8" font-family="system-ui" font-size="13" text-anchor="middle">Cameroon</text>
  <!-- Legend -->
  <rect x="160" y="580" width="16" height="16" rx="3" fill="#3b82f6"/>
  <text x="184" y="593" fill="#cbd5e1" font-family="system-ui" font-size="13">Asylum Claims</text>
  <rect x="320" y="580" width="16" height="16" rx="3" fill="#f59e0b"/>
  <text x="344" y="593" fill="#cbd5e1" font-family="system-ui" font-size="13">Student Visa Grants</text>
  <!-- Title -->
  <text x="600" y="60" fill="#f1f5f9" font-family="system-ui" font-size="32" font-weight="700" text-anchor="middle">UK Study Visa Ban: Asylum Claims vs Student Visas</text>
  <text x="600" y="95" fill="#94a3b8" font-family="system-ui" font-size="18" text-anchor="middle">Myanmar students outnumber asylum claimants - the opposite of the other 3 countries</text>
  <!-- Annotation arrow pointing to Myanmar -->
  <line x1="730" y1="400" x2="730" y2="370" stroke="#10b981" stroke-width="2" opacity="0.7"/>
  <text x="730" y="362" fill="#10b981" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">Students > Claims</text>
</svg>
